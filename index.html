<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>95 OS - Desktop</title>
    <style>
        :root {
            --win-grey: #c0c0c0;
            --win-white: #ffffff;
            --win-dark: #808080;
            --win-black: #000000;
            --win-blue: #000080;
        }

        * {
            box-sizing: border-box;
            -webkit-font-smoothing: none;
            font-smooth: never;
            font-family: 'Tahoma', sans-serif;
            font-size: 11px;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background: #008080 url('https://i.pinimg.com/736x/a7/a2/0e/a7a20e9a4c0c5ed6af6cbaf3c268d701.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* Desktop Icons */
        .desktop-icons { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 20px; z-index: 1; }
        .icon { width: 75px; text-align: center; color: white; cursor: pointer; padding: 5px; text-shadow: 1px 1px 1px black; }
        .icon img { width: 32px; height: 32px; display: block; margin: 0 auto 2px auto; image-rendering: pixelated; }

        /* Windows */
        .window { position: absolute; background: var(--win-grey); border: 2px solid; border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white); display: none; flex-direction: column; z-index: 10; padding: 2px; }
        .window.maximized { top: 0 !important; left: 0 !important; width: 100vw !important; height: calc(100vh - 28px) !important; }

        .title-bar { background: var(--win-blue); color: white; padding: 2px 4px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; cursor: default; user-select: none; }
        .window-controls { display: flex; gap: 2px; }
        .window-controls button { width: 16px; height: 14px; background: var(--win-grey); border: 1px solid; border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white); cursor: pointer; font-weight: bold; color: black; display: flex; align-items: center; justify-content: center; padding: 0; }

        .content-frame { flex-grow: 1; background: var(--win-white); border: 2px inset var(--win-grey); overflow: hidden; display: flex; flex-direction: column; position: relative; }

        /* IE Tab System */
        .ie-tabs-bar { background: var(--win-grey); display: flex; padding: 2px 2px 0 2px; gap: 2px; border-bottom: 1px solid var(--win-dark); align-items: flex-end; }
        .ie-tab { padding: 2px 6px; background: #b0b0b0; border: 1px solid var(--win-dark); border-bottom: none; cursor: pointer; display: flex; align-items: center; gap: 8px; max-width: 120px; }
        .ie-tab.active { background: var(--win-grey); border: 2px solid; border-color: var(--win-white) var(--win-dark) transparent var(--win-white); margin-top: -1px; padding-bottom: 3px; z-index: 2; }
        .close-tab-btn { font-size: 9px; font-weight: bold; padding: 0 2px; }
        .new-tab-btn { padding: 2px 8px; cursor: pointer; font-weight: bold; background: var(--win-grey); border: 1px solid var(--win-dark); margin-bottom: 2px; }

        .ie-iframe-container { flex-grow: 1; position: relative; }
        .ie-iframe-container iframe { position: absolute; top:0; left:0; width: 100%; height: 100%; border: none; display: none; }
        .ie-iframe-container iframe.active { display: block; }

        /* Taskbar */
        .taskbar { position: absolute; bottom: 0; width: 100%; height: 28px; background: var(--win-grey); border-top: 2px solid var(--win-white); display: flex; align-items: center; z-index: 1000; padding: 2px; }
        .start-btn { font-weight: bold; padding: 2px 6px; margin-right: 4px; border: 2px solid; border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white); display: flex; align-items: center; gap: 4px; cursor: pointer; z-index: 1001; }
        
        /* Pinned Bar */
        .pinned-bar { display: flex; gap: 2px; padding: 0 5px; border-right: 1px solid var(--win-dark); margin-right: 5px; height: 22px; align-items: center; }
        .pinned-icon { cursor: pointer; padding: 2px; border: 1px solid transparent; }
        .pinned-icon:hover { border: 1px solid var(--win-white); background: rgba(255,255,255,0.2); }
        .pinned-icon img { width: 16px; height: 16px; image-rendering: pixelated; }

        .task-list { display: flex; gap: 4px; flex-grow: 1; height: 100%; align-items: center; }
        .task-button { height: 22px; min-width: 100px; max-width: 150px; background: var(--win-grey); border: 2px solid; border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white); padding: 0 5px; display: flex; align-items: center; gap: 5px; cursor: pointer; overflow: hidden; white-space: nowrap; }
        .task-button.active { border-color: var(--win-black) var(--win-white) var(--win-white) var(--win-black); background: #e0e0e0; font-weight: bold; }

        /* Start Menu */
        .start-menu { position: absolute; bottom: 28px; left: 2px; width: 180px; background: var(--win-grey); border: 2px solid; border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white); display: none; flex-direction: row; z-index: 1100; }
        .start-sidebar { width: 25px; background: linear-gradient(to top, #000080, #1084d0); writing-mode: vertical-rl; transform: rotate(180deg); color: white; font-weight: bold; padding: 10px 2px; font-size: 14px; text-align: center; }
        .menu-items { flex-grow: 1; }
        .menu-item { padding: 4px 8px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; color: black; }
        .menu-item:hover { background: var(--win-blue); color: white; }
        .pin-action { font-size: 9px; border: 1px solid var(--win-dark); padding: 0 2px; background: #eee; color: black; }

        /* Volume Popup */
        .sys-tray { border: 2px inset var(--win-grey); padding: 2px 6px; margin-left: auto; display: flex; align-items: center; gap: 8px; position: relative; }
        .volume-popup { position: absolute; bottom: 30px; right: 40px; width: 40px; height: 100px; background: var(--win-grey); border: 2px solid; border-color: var(--win-white) var(--win-black) var(--win-black) var(--win-white); display: none; flex-direction: column; align-items: center; padding: 5px; z-index: 2000; }
        .volume-slider { writing-mode: bt-lr; appearance: slider-vertical; width: 20px; height: 70px; }

        .dragging iframe { pointer-events: none; }
    </style>
</head>
<body onclick="hideStartMenu(); hideVolume()">

<div class="desktop-icons">
    <div class="icon" onclick="openApp('explorer', 'My Computer', 'https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png')"><img src="https://win98icons.alexmeub.com/icons/png/computer_explorer-4.png"> My Computer</div>
    <div class="icon" onclick="openApp('ie', 'Internet Explorer', 'https://win98icons.alexmeub.com/icons/png/msie1-2.png')"><img src="https://win98icons.alexmeub.com/icons/png/msie1-2.png"> Internet Explorer</div>
    <div class="icon" onclick="openApp('notepad', 'Notepad', 'https://win98icons.alexmeub.com/icons/png/notepad-0.png')"><img src="https://win98icons.alexmeub.com/icons/png/notepad-0.png"> Notepad</div>
    <div class="icon" onclick="openApp('calc', 'Calculator', 'https://win98icons.alexmeub.com/icons/png/calculator-0.png')"><img src="https://win98icons.alexmeub.com/icons/png/calculator-0.png"> Calculator</div>
    <div class="icon" onclick="openApp('music', '95 Music', 'https://win98icons.alexmeub.com/icons/png/cd_audio_cd-4.png')"><img src="https://images.dwncdn.net/images/t_app-icon-l/p/6598e7df-7cd1-4163-8d6f-69d8d8978cbd/3589763149/2141_4-78370130-imgingest-4910938650338722334.png"> 95 Music</div>
</div>

<div class="start-menu" id="start-menu" onclick="event.stopPropagation()">
    <div class="start-sidebar">Windows 95</div>
    <div class="menu-items">
        <div class="menu-item" onclick="openApp('ie', 'Internet Explorer', 'https://win98icons.alexmeub.com/icons/png/msie1-2.png')">
            <span><img src="https://win98icons.alexmeub.com/icons/png/msie1-2.png" width="16"> Internet Explorer</span>
            <span class="pin-action" onclick="pinApp(event, 'ie', 'https://win98icons.alexmeub.com/icons/png/msie1-2.png', 'Internet Explorer')">Pin</span>
        </div>
        <div class="menu-item" onclick="openApp('music', '95 Music', 'https://win98icons.alexmeub.com/icons/png/cd_audio_cd-4.png')">
            <span><img src="https://win98icons.alexmeub.com/icons/png/cd_audio_cd-4.png" width="16"> 95 Music</span>
            <span class="pin-action" onclick="pinApp(event, 'music', 'https://win98icons.alexmeub.com/icons/png/cd_audio_cd-4.png', '95 Music')">Pin</span>
        </div>
        <div class="menu-item" onclick="openApp('notepad', 'Notepad', 'https://win98icons.alexmeub.com/icons/png/notepad-0.png')">
            <span><img src="https://win98icons.alexmeub.com/icons/png/notepad-0.png" width="16"> Notepad</span>
            <span class="pin-action" onclick="pinApp(event, 'notepad', 'https://win98icons.alexmeub.com/icons/png/notepad-0.png', 'Notepad')">Pin</span>
        </div>
        <div class="menu-item" onclick="openApp('calc', 'Calculator', 'https://win98icons.alexmeub.com/icons/png/calculator-0.png')">
            <span><img src="https://win98icons.alexmeub.com/icons/png/calculator-0.png" width="16"> Calculator</span>
            <span class="pin-action" onclick="pinApp(event, 'calc', 'https://win98icons.alexmeub.com/icons/png/calculator-0.png', 'Calculator')">Pin</span>
        </div>
        <div style="height:1px; background:gray; margin:4px 0;"></div>
        <div class="menu-item" onclick="location.reload()"><img src="https://win98icons.alexmeub.com/icons/png/shut_down_normal-4.png" width="16"> Shut Down...</div>
    </div>
</div>

<div class="window" id="win-music" style="width: 335px; height: 680px; top: 10px; left: 300px;">
    <div class="title-bar" onmousedown="dragStart(event, 'win-music')">
        <span>95 Music Player</span>
        <div class="window-controls"><button onclick="minimizeApp('music')">_</button><button onclick="closeApp('music')">X</button></div>
    </div>
    <div class="content-frame">
        <iframe src="music.html" style="width:100%; height:100%; border:none;"></iframe>
    </div>
</div>

<div class="window" id="win-ie" style="width: 550px; height: 400px; top: 40px; left: 60px;">
    <div class="title-bar" onmousedown="dragStart(event, 'win-ie')">
        <span>Internet Explorer</span>
        <div class="window-controls"><button onclick="minimizeApp('ie')">_</button><button onclick="toggleMaximize('win-ie')">□</button><button onclick="closeApp('ie')">X</button></div>
    </div>
    <div class="ie-tabs-bar" id="ie-tabs"><div class="new-tab-btn" onclick="addTab()">+</div></div>
    <div class="content-frame ie-iframe-container" id="ie-iframe-container"></div>
</div>

<div class="window" id="win-notepad" style="width: 300px; height: 200px; top: 150px; left: 150px;">
    <div class="title-bar" onmousedown="dragStart(event, 'win-notepad')">
        <span>Notepad - Untitled</span>
        <div class="window-controls"><button onclick="minimizeApp('notepad')">_</button><button onclick="toggleMaximize('win-notepad')">□</button><button onclick="closeApp('notepad')">X</button></div>
    </div>
    <textarea style="width:100%; height:100%; border:none; resize:none; padding:5px; outline:none;"></textarea>
</div>

<div class="window" id="win-calc" style="width: 180px; top: 120px; left: 220px;">
    <div class="title-bar" onmousedown="dragStart(event, 'win-calc')">
        <span>Calculator</span>
        <div class="window-controls"><button onclick="minimizeApp('calc')">_</button><button onclick="closeApp('calc')">X</button></div>
    </div>
    <div class="content-frame">
        <div id="calc-screen" style="background:white; text-align:right; padding:5px; font-size:14px; border-bottom:1px solid gray;">0</div>
        <div style="padding:5px; display:grid; grid-template-columns: repeat(4, 1fr); gap:2px;">
            <button onclick="cIn('7')">7</button><button onclick="cIn('8')">8</button><button onclick="cIn('9')">9</button><button onclick="cIn('/')">/</button>
            <button onclick="cIn('4')">4</button><button onclick="cIn('5')">5</button><button onclick="cIn('6')">6</button><button onclick="cIn('*')">*</button>
            <button onclick="cIn('1')">1</button><button onclick="cIn('2')">2</button><button onclick="cIn('3')">3</button><button onclick="cIn('-')">-</button>
            <button onclick="cClear()">C</button><button onclick="cIn('0')">0</button><button onclick="cRes()">=</button><button onclick="cIn('+')">+</button>
        </div>
    </div>
</div>

<div class="taskbar">
    <div class="start-btn" id="start-btn" onclick="toggleStartMenu(event)"><img src="https://win98icons.alexmeub.com/icons/png/windows-0.png" width="16"> Start</div>
    
    <div class="pinned-bar" id="pinned-bar">
        </div>

    <div class="task-list" id="task-list"></div>
    
    <div class="sys-tray">
        <div onclick="toggleVolume(event)" style="cursor:pointer;">🔊</div>
        <div id="clock"></div>
        <div class="volume-popup" id="volume-popup" onclick="event.stopPropagation()">
            <input type="range" class="volume-slider" min="0" max="100" value="50">
            <div style="font-size:9px; margin-top:5px;">Vol</div>
        </div>
    </div>
</div>

<script>
    let openWindows = {};
    const IE_URL = "https://founded-interface-assessing-conflict.trycloudflare.com/";

    function toggleStartMenu(e) {
        e.stopPropagation();
        const m = document.getElementById('start-menu');
        m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
    }
    function hideStartMenu() { document.getElementById('start-menu').style.display = 'none'; }

    function toggleVolume(e) {
        e.stopPropagation();
        const v = document.getElementById('volume-popup');
        v.style.display = v.style.display === 'flex' ? 'none' : 'flex';
    }
    function hideVolume() { document.getElementById('volume-popup').style.display = 'none'; }

    function pinApp(e, id, icon, name) {
        e.stopPropagation();
        if (document.getElementById('pin-' + id)) return;
        const bar = document.getElementById('pinned-bar');
        const pin = document.createElement('div');
        pin.className = 'pinned-icon';
        pin.id = 'pin-' + id;
        pin.title = name;
        pin.innerHTML = `<img src="${icon}">`;
        pin.onclick = () => openApp(id, name, icon);
        bar.appendChild(pin);
        hideStartMenu();
    }

    function openApp(id, name, icon) {
        const win = document.getElementById('win-' + id);
        win.style.display = 'flex';
        focusWindow(win);
        if (!openWindows[id]) {
            addToTaskbar(id, name, icon);
            openWindows[id] = true;
            if(id === 'ie') resetIE();
        }
        hideStartMenu();
    }

    function addToTaskbar(id, name, icon) {
        const list = document.getElementById('task-list');
        const btn = document.createElement('div');
        btn.className = 'task-button'; btn.id = 'task-' + id;
        btn.innerHTML = `<img src="${icon}" width="14"> ${name}`;
        btn.onclick = () => {
            const win = document.getElementById('win-' + id);
            if (win.style.display === 'none') { win.style.display = 'flex'; focusWindow(win); }
            else { minimizeApp(id); }
        };
        list.appendChild(btn);
    }

    function minimizeApp(id) { document.getElementById('win-' + id).style.display = 'none'; }
    function closeApp(id) { 
        document.getElementById('win-' + id).style.display = 'none';
        const btn = document.getElementById('task-' + id);
        if (btn) btn.remove();
        delete openWindows[id];
        if(id === 'ie') { document.getElementById('ie-iframe-container').innerHTML = ''; tabs = []; }
    }

    function toggleMaximize(winId) { document.getElementById(winId).classList.toggle('maximized'); }
    function focusWindow(el) {
        document.querySelectorAll('.window').forEach(w => w.style.zIndex = 10);
        el.style.zIndex = 100;
        document.querySelectorAll('.task-button').forEach(b => b.classList.remove('active'));
        const tBtn = document.getElementById('task-' + el.id.replace('win-', ''));
        if(tBtn) tBtn.classList.add('active');
    }

    // IE Multi-Tab
    let tabs = [];
    let activeTabId = null;
    function resetIE() { document.getElementById('ie-iframe-container').innerHTML = ''; tabs = []; addTab(); }
    function addTab() {
        const id = Date.now();
        tabs.push({ id: id, title: 'Tab ' + (tabs.length + 1) });
        const ifr = document.createElement('iframe');
        ifr.id = 'ifr-' + id; ifr.src = IE_URL;
        document.getElementById('ie-iframe-container').appendChild(ifr);
        switchTab(id);
    }
    function switchTab(id) {
        activeTabId = id;
        document.querySelectorAll('.ie-iframe-container iframe').forEach(ifr => ifr.classList.remove('active'));
        document.getElementById('ifr-' + id).classList.add('active');
        renderTabs();
    }
    function closeTab(e, id) {
        e.stopPropagation();
        document.getElementById('ifr-' + id).remove();
        tabs = tabs.filter(t => t.id !== id);
        if(tabs.length === 0) closeApp('ie');
        else if(activeTabId === id) switchTab(tabs[tabs.length-1].id);
        else renderTabs();
    }
    function renderTabs() {
        const container = document.getElementById('ie-tabs');
        container.querySelectorAll('.ie-tab').forEach(t => t.remove());
        tabs.forEach(tab => {
            const div = document.createElement('div');
            div.className = `ie-tab ${tab.id === activeTabId ? 'active' : ''}`;
            div.innerHTML = `<span>${tab.title}</span><span class="close-tab-btn" onclick="closeTab(event, ${tab.id})">x</span>`;
            div.onclick = () => switchTab(tab.id);
            container.insertBefore(div, container.querySelector('.new-tab-btn'));
        });
    }

    // Draggable
    let dragging = false, offset = { x: 0, y: 0 }, target = null;
    function dragStart(e, id) {
        target = document.getElementById(id);
        if (target.classList.contains('maximized')) return;
        dragging = true; offset.x = e.clientX - target.offsetLeft; offset.y = e.clientY - target.offsetTop;
        focusWindow(target); document.body.classList.add('dragging');
    }
    window.addEventListener('mousemove', e => { if (dragging && target) { target.style.left = (e.clientX - offset.x) + 'px'; target.style.top = (e.clientY - offset.y) + 'px'; }});
    window.addEventListener('mouseup', () => { dragging = false; target = null; document.body.classList.remove('dragging'); });

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}); }, 1000);
    
    // Calculator
    let cur="0";
    function cIn(v) { cur === "0" ? cur = v : cur += v; document.getElementById('calc-screen').innerText = cur; }
    function cClear() { cur = "0"; document.getElementById('calc-screen').innerText = "0"; }
    function cRes() { try { cur = eval(cur).toString(); document.getElementById('calc-screen').innerText = cur; } catch { cur = "Err"; } }
</script>
</body>
</html>
